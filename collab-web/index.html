<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collab — worker dashboard</title>
  <meta name="description" content="Real-time messaging dashboard for AI agent coordination — monitor workers, send messages, and manage your agent swarm.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    button { font: inherit; cursor: pointer; background: none; border: none; }
    input  { font: inherit; }

    :root {
      --bg:      #0f1729;
      --topbar:  #080c18;
      --surface: #162040;
      --sur2:    #1c2850;
      --members: #0b1020;
      --border:  rgba(255,255,255,0.07);
      --bhi:     rgba(255,255,255,0.14);
      --text:    #dde4f0;
      --sub:     #8896b3;
      --dim:     #3d4f6e;
      --dim-text: #7289a8;
      --online:  #22c55e;
      --offline: #3d4f6e;
      --danger:  #ef4444;
      --t: 0.14s;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Manrope', sans-serif; color: var(--text); background: var(--bg); display: flex; flex-direction: column; }
    :focus-visible { outline: 2px solid #22d3ee; outline-offset: 2px; border-radius: 3px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sur2); border-radius: 2px; }

    /* ─── Top bar ─────────────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 44px; flex-shrink: 0;
      background: var(--topbar); border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -.03em;
      background: linear-gradient(125deg,#22d3ee,#a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      user-select: none; flex-shrink: 0;
    }
    .tdiv { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
    .ch-badge { font-size: 15px; font-weight: 600; color: var(--sub); flex-shrink: 0; }
    .ch-badge span { color: var(--dim); }
    .server-row { display: flex; align-items: center; gap: 6px; }
    .server-row label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dim-text); }
    #server-url {
      font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: var(--sub);
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 3px 8px; width: 190px;
      transition: border-color var(--t), color var(--t);
    }
    #server-url:focus { border-color: #22d3ee; color: var(--text); outline: none; }
    .import-btn {
      display: flex; align-items: center; gap: 4px; padding: 3px 9px;
      font-size: 15px; font-weight: 600; color: var(--dim-text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      transition: color var(--t), border-color var(--t);
    }
    .import-btn:hover { color: var(--sub); border-color: var(--bhi); }
    #import-file { display: none; }
    .conn { display: flex; align-items: center; gap: 5px; margin-left: auto; flex-shrink: 0; }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--offline); transition: background var(--t), box-shadow var(--t); }
    .conn[data-state="ok"]  .conn-dot { background: var(--online); box-shadow: 0 0 6px var(--online); animation: pulse 2.5s ease-in-out infinite; }
    .conn[data-state="err"] .conn-dot { background: var(--danger); }
    .conn-label { font-size: 12px; font-weight: 600; color: var(--dim-text); transition: color var(--t); }
    .conn[data-state="ok"]  .conn-label { color: var(--online); }
    .conn[data-state="err"] .conn-label { color: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    /* ─── Layout ──────────────────────────────────────────────────────────── */
    .layout { flex: 1; display: flex; overflow: hidden; }

    /* ─── Feed ────────────────────────────────────────────────────────────── */
    .feed-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .feed-header {
      display: flex; align-items: center; gap: 8px;
      padding: 0 18px; height: 44px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .feed-title { font-size: 16px; font-weight: 700; }
    .feed-title span { color: var(--dim); }
    .feed-desc { font-size: 14px; color: var(--dim-text); }
    .msg-pill {
      margin-left: auto; font-size: 12px; font-weight: 600; color: var(--dim-text);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 8px;
    }
    #last-updated { color: var(--dim-text); opacity: .75; }
    /* Feed tabs */
    .feed-tabs { display: flex; gap: 2px; margin-right: 4px; }
    .feed-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--dim-text);
      background: none; transition: color var(--t), background var(--t);
      white-space: nowrap;
    }
    .feed-tab:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .feed-tab.active { color: var(--text); background: rgba(255,255,255,.08); box-shadow: inset 0 -2px 0 #22d3ee; }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; border-radius: 9px; padding: 0 4px;
      font-size: 10px; font-weight: 800; line-height: 1;
      background: var(--danger); color: #fff;
    }
    .tab-badge:empty { display: none; }
    /* Reply button on message rows */
    .msg-reply-btn {
      display: none; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 4px; margin-left: auto; flex-shrink: 0;
      font-size: 13px; color: var(--dim);
      transition: color var(--t), background var(--t);
    }
    .msg-row:hover .msg-reply-btn { display: flex; }
    .msg-reply-btn:hover { color: var(--text); background: var(--sur2); }

    .feed { flex: 1; overflow-y: auto; padding: 12px 0 8px; }

    .date-div {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px 6px;
      font-size: 15px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .date-div::before, .date-div::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ─── Message rows ────────────────────────────────────────────────────── */
    .msg-row { display: flex; gap: 12px; padding: 3px 18px; transition: background var(--t); }
    .msg-row:hover { background: rgba(255,255,255,.03); }
    @keyframes msgin    { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    @keyframes msgflash { 0%{background:rgba(34,211,238,.15)} 30%{background:rgba(34,211,238,.1)} 100%{background:transparent} }
    .msg-row.is-new { animation: msgin .18s ease-out, msgflash 2s ease-out forwards; }

    .msg-av { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; overflow: hidden; margin-top: 2px; }
    .av-face { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; line-height: 1; user-select: none; border-radius: inherit; }

    .msg-body { flex: 1; min-width: 0; padding-top: 1px; }
    .msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
    .msg-author { font-size: 15px; font-weight: 700; }
    .msg-to { font-size: 15px; color: var(--dim-text); }
    .msg-time { font-size: 15px; color: var(--dim-text); }
    .msg-hash { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--dim-text); }
    .msg-text { font-size: 15px; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; }

    .feed-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; gap: 8px; color: var(--dim); font-size: 15px; }
    .feed-empty-icon { font-size: 30px; opacity: .3; }

    /* ─── Compose bar ─────────────────────────────────────────────────────── */
    .compose-bar {
      flex-shrink: 0; padding: 10px 18px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .compose-from {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 0 10px; height: 36px;
      transition: border-color var(--t);
    }
    .compose-from:focus-within { border-color: var(--bhi); }
    .compose-as { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); }
    #compose-name {
      background: none; border: none; outline: none; width: 80px;
      font-size: 18px; font-weight: 600; color: var(--text);
    }
    #compose-name::placeholder { color: var(--dim); }
    .compose-field {
      flex: 1; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 0 6px 0 12px; min-height: 36px;
      transition: border-color var(--t);
    }
    .img-strip { flex: 0 0 100%; display: flex; align-items: center; gap: 8px; padding: 6px 0 4px; }
    .img-strip img { height: 56px; max-width: 90px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
    .img-strip-remove {
      width: 20px; height: 20px; border-radius: 4px; font-size: 15px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--dim); background: var(--sur2);
      transition: color var(--t), background var(--t);
    }
    .img-strip-remove:hover { color: var(--danger); background: rgba(239,68,68,.15); }
    .msg-img { max-width: 320px; max-height: 240px; border-radius: 6px; display: block; margin-top: 4px; cursor: zoom-in; }
    .compose-field:focus-within { border-color: var(--bhi); }
    #compose-input { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: var(--text); }
    #compose-input::placeholder { color: var(--dim); }
    .compose-send {
      width: 26px; height: 26px; border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--sur2); color: var(--sub);
      transition: background var(--t), color var(--t);
    }
    .compose-send:hover { background: #22d3ee; color: #080c18; }
    .compose-send:disabled { opacity: .3; pointer-events: none; }
    .compose-send svg { width: 13px; height: 13px; }

    /* ─── Mention & slash autocomplete ─────────────────────────────────────── */
    .compose-bar { position: relative; }
    #mention-list, #slash-list {
      position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
      background: #111827; border: 1px solid var(--bhi); border-radius: 8px;
      overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.7);
      list-style: none; z-index: 200;
    }
    #mention-list[hidden], #slash-list[hidden] { display: none; }
    .mention-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      transition: background var(--t);
    }
    .mention-item[aria-selected="true"] { background: rgba(255,255,255,.09); }
    .mention-item:hover { background: rgba(255,255,255,.06); }
    .mention-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mention-role { font-size: 12px; font-weight: 400; color: var(--dim); margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
    /* Slash command palette */
    .slash-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; cursor: pointer; font-size: 14px;
      transition: background var(--t);
    }
    .slash-item[aria-selected="true"] { background: rgba(255,255,255,.09); }
    .slash-item:hover { background: rgba(255,255,255,.06); }
    .slash-cmd { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #22d3ee; min-width: 56px; }
    .slash-desc { font-size: 13px; color: var(--sub); }
    .slash-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--dim); margin-left: auto; }

    /* ─── Members panel ───────────────────────────────────────────────────── */
    .members {
      width: 216px; flex-shrink: 0;
      background: var(--members); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
      padding: 14px 0 10px;
    }
    .members-heading { padding: 0 12px 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
    .mem-section { margin-bottom: 12px; }
    .mem-section-lbl { padding: 0 12px 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--dim); }

    .member-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px; cursor: default;
      transition: background var(--t);
    }
    .member-row:hover { background: rgba(255,255,255,.04); }

    /* Avatar button in members panel */
    .member-av-btn {
      position: relative; width: 30px; height: 30px; border-radius: 7px;
      flex-shrink: 0; overflow: hidden; cursor: pointer;
      transition: opacity var(--t);
    }
    .member-av-btn:hover { opacity: .85; }
    .member-av-btn .av-face { font-size: 18px; }
    .member-av-btn .edit-hint {
      position: absolute; inset: 0; border-radius: inherit;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; opacity: 0; pointer-events: none;
      transition: opacity var(--t);
    }
    .member-av-btn:hover .edit-hint { opacity: 1; }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .member-role { font-size: 12px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .member-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-on  { background: var(--online);  box-shadow: 0 0 5px var(--online); }
    .dot-off { background: var(--offline); }
    .members-empty { padding: 4px 12px; font-size: 14px; color: var(--dim); font-style: italic; }

    /* ─── Avatar picker ───────────────────────────────────────────────────── */
    #picker {
      position: fixed; z-index: 1000;
      background: #111827; border: 1px solid var(--bhi);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,.8);
      display: flex; flex-direction: column; gap: 10px;
      width: 264px;
    }
    #picker[hidden] { display: none; }
    .picker-section-lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 4px; }
    .av-search {
      width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 5px; padding: 4px 9px; font-size: 13px; color: var(--text);
      outline: none; transition: border-color var(--t);
    }
    .av-search:focus { border-color: #22d3ee; }
    .av-search::placeholder { color: var(--dim); }
    .av-grid-scroll { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .av-cat { display: flex; flex-direction: column; gap: 4px; }
    .picker-cat-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
    .av-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .av-btn {
      width: 38px; height: 38px; border-radius: 8px; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid transparent; background: rgba(255,255,255,.05);
      transition: border-color var(--t), background var(--t), transform var(--t);
    }
    .av-btn:hover    { background: rgba(255,255,255,.1); transform: scale(1.08); }
    .av-btn.selected { border-color: var(--picker-color, #22d3ee); background: rgba(var(--picker-rgb, 34,211,238),.15); }
    .color-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .preset-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
      transition: transform var(--t), border-color var(--t);
    }
    .preset-dot:hover  { transform: scale(1.2); }
    .preset-dot.sel    { border-color: white; transform: scale(1.15); }
    #picker-custom {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      padding: 0; cursor: pointer; background: none;
      -webkit-appearance: none; appearance: none; overflow: hidden;
      flex-shrink: 0;
    }
    #picker-custom::-webkit-color-swatch-wrapper { padding: 0; }
    #picker-custom::-webkit-color-swatch { border: none; border-radius: 50%; }

    /* ─── Sound toggle ───────────────────────────────────────────────────── */
    .sound-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 5px; font-size: 15px;
      color: var(--dim); transition: color var(--t), background var(--t);
    }
    .sound-btn:hover { color: var(--sub); background: rgba(255,255,255,.06); }
    .sound-btn[data-on="true"]  { color: var(--sub); }
    .sound-btn[data-on="false"] { color: var(--dim); opacity: .5; }

    .stop-btn {
      display: flex; align-items: center; gap: 5px; padding: 3px 10px;
      font-size: 12px; font-weight: 700; letter-spacing: .03em;
      color: #ef4444; background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25); border-radius: 4px;
      transition: background var(--t), border-color var(--t), color var(--t);
    }
    .stop-btn:hover { background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.5); }
    .stop-btn[data-state="stopped"] {
      color: #22c55e; background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.25);
    }
    .stop-btn[data-state="stopped"]:hover { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.5); }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* ─── Worker tooltip ─────────────────────────────────────────────────────── */
    #worker-tip {
      position: fixed; z-index: 3000; pointer-events: none;
      background: #0d1526; border: 1px solid var(--bhi);
      border-radius: 8px; padding: 10px 13px;
      box-shadow: 0 8px 28px rgba(0,0,0,.75);
      min-width: 168px; max-width: 230px;
      animation: tipfade .1s ease-out;
    }
    #worker-tip[hidden] { display: none; }
    @keyframes tipfade { from{opacity:0;transform:translateX(4px)} to{opacity:1;transform:none} }
    .tip-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .tip-row  { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--sub); margin-top: 4px; }
    .tip-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tip-lbl  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); }

    @media (max-width: 720px) {
      .members { display: none; }
      #server-url { width: 130px; }
    }
  </style>
</head>
<body>

<header class="topbar" role="banner">
  <span class="logo" aria-label="Collab">collab</span>
  <div class="tdiv" aria-hidden="true"></div>
  <span class="ch-badge"><span aria-hidden="true">#</span>general</span>
  <div class="tdiv" aria-hidden="true"></div>
  <div class="server-row">
    <label for="server-url">server</label>
    <input id="server-url" type="url" autocomplete="off" spellcheck="false"
           value="http://localhost:8000" aria-label="Collab server URL">
  </div>
  <button class="import-btn" id="import-btn" aria-label="Import config">
    <span aria-hidden="true">⬆</span> import config
  </button>
  <input type="file" id="import-file" accept=".json" aria-hidden="true">
  <button class="sound-btn" id="sound-btn" data-on="true" aria-label="Toggle notification sound" title="Notification sound">🔔</button>
  <button class="stop-btn" id="stop-btn" data-state="running" aria-label="Stop all worker polling">⏹ Stop All</button>
  <div id="conn" class="conn" role="status" aria-live="polite" aria-atomic="true">
    <span class="conn-dot" aria-hidden="true"></span>
    <span class="conn-label" id="conn-label">connecting…</span>
  </div>
</header>

<!-- Avatar picker popover -->
<div id="picker" hidden role="dialog" aria-label="Customize avatar" aria-modal="true">
  <div>
    <p class="picker-section-lbl">Avatar</p>
    <input id="av-search" class="av-search" type="text" placeholder="Search avatars…" autocomplete="off" spellcheck="false" aria-label="Search avatars">
    <div style="margin-top:6px" id="av-grid" class="av-grid-scroll" role="group" aria-label="Choose avatar"></div>
  </div>
  <div>
    <p class="picker-section-lbl">Color</p>
    <div class="color-row" id="color-row" role="group" aria-label="Choose color"></div>
  </div>
</div>

<main class="layout">

  <!-- Feed -->
  <div class="feed-wrap">
    <div class="feed-header">
      <span class="feed-title" id="feed-title"><span aria-hidden="true">#</span>general</span>
      <span class="feed-desc" id="feed-desc">All worker messages</span>
      <div class="feed-tabs" role="tablist">
        <button class="feed-tab active" id="tab-all" role="tab" aria-selected="true">All</button>
        <button class="feed-tab" id="tab-mentions" role="tab" aria-selected="false">@mentions <span class="tab-badge" id="inbox-badge"></span></button>
      </div>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let pendingImage = null;

function renderContent(text) {
  const IMG_MARKER = '\n[img]';
  const idx = text.indexOf(IMG_MARKER);
  if (idx !== -1) {
    const txtPart = text.slice(0, idx);
    const dataUrl = text.slice(idx + IMG_MARKER.length);
    const textHtml = txtPart ? `<span>${esc(txtPart)}</span>` : '';
    return `${textHtml}<img class="msg-img" src="${dataUrl}" alt="image" loading="lazy">`;
  }
  if (text.startsWith('data:image/')) {
    return `<img class="msg-img" src="${text}" alt="image" loading="lazy">`;
  }
  return esc(text);
}

function fmtTime(iso) { return new Date(iso).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso) {
  const d = new Date(iso), today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Today';
  const yd = new Date(today); yd.setDate(today.getDate()-1);
  if (d.toDateString() === yd.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
}
function online(last_seen) { return (Date.now() - new Date(last_seen)) / 1000 < 120; }
function announce(msg) { const el=document.getElementById('sr-live'); el.textContent=''; requestAnimationFrame(()=>el.textContent=msg); }
function hexRgb(hex) { return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; }
function faceHtml(style, hex) {
  const av = AV_MAP[style] || AV_MAP['robot'];
  return `<div class="av-face" style="background:rgba(${hexRgb(hex)},.18)" aria-hidden="true">${av.emoji}</div>`;
}

function assignColor(id) {
  if (!S.colorMap[id]) {
    const p = getPrefs(id);
    let hex = p.color && typeof p.color === 'string' && p.color.startsWith('#') ? p.color : null;
    if (!hex && typeof p.color === 'number') hex = PRESET_COLORS[p.color % PRESET_COLORS.length]; // migrate old
    S.colorMap[id] = hex || PRESET_COLORS[S.colorIdx++ % PRESET_COLORS.length];
  }
  return S.colorMap[id];
}
function workerStyle(id) { return getPrefs(id).style || 'robot'; }

// ── Feed ──────────────────────────────────────────────────────────────────────
function getAllMsgs() {
  const seen = new Set(), all = [];
  for (const msgs of Object.values(S.histories))
    for (const m of msgs) if (!seen.has(m.id)) { seen.add(m.id); all.push(m); }
  return all.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
}

function unrepliedSenderCount(me, allMsgs) {
  if (!me) return 0;
  // For each sender who messaged me, check if I've sent anything back after their latest message
  const latestToMe = {};
  allMsgs.forEach(m => {
    if (m.recipient !== me) return;
    const t = new Date(m.timestamp).getTime();
    if (!latestToMe[m.sender] || t > latestToMe[m.sender]) latestToMe[m.sender] = t;
  });
  const myLatestTo = {};
  allMsgs.forEach(m => {
    if (m.sender !== me) return;
    const t = new Date(m.timestamp).getTime();
    [m.recipient, 'all'].forEach(r => {
      if (!myLatestTo[r] || t > myLatestTo[r]) myLatestTo[r] = t;
    });
  });
  return Object.entries(latestToMe).filter(([sender, t]) =>
    (!myLatestTo[sender] || myLatestTo[sender] < t) &&
    (!myLatestTo['all']  || myLatestTo['all']  < t)
  ).length;
}

function renderFeed() {
  const feed  = document.getElementById('feed');
  const empty = document.getElementById('feed-empty');
  const me    = document.getElementById('compose-name').value.trim();
  const all   = getAllMsgs();

  // Update @mentions badge with count of messages addressed to me
  const mentionCount = me ? all.filter(m => m.recipient === me).length : 0;
  const badge = document.getElementById('inbox-badge');
  badge.textContent = mentionCount || '';

  let msgs = S.inboxMode ? all.filter(m => m.recipient === me || m.recipient === 'all') : all;

  document.getElementById('feed-title').innerHTML =
    S.inboxMode ? `<span aria-hidden="true">@</span>mentions` : `<span aria-hidden="true">#</span>general`;
  document.getElementById('feed-desc').textContent =
    S.inboxMode ? (me ? `Messages to @${me}` : 'Set your name to filter mentions') : 'All worker messages';

  document.getElementById('msg-count').textContent = `${msgs.length} message${msgs.length===1?'':'s'}`;
  if (!msgs.length) { empty.hidden = false; feed.innerHTML = ''; return; }
  empty.hidden = true;

  const atBottom  = feed.scrollHeight - feed.scrollTop <= feed.clientHeight + 60;
  const prevTop   = feed.scrollTop;
  const prevCount = parseInt(feed.dataset.count || 0);
  const isAppend  = !S.inboxMode && msgs.length > prevCount && prevCount > 0;

  if (isAppend) {
    msgs.slice(prevCount).forEach(m => {
      const el = document.createElement('div');
      el.innerHTML = msgHtml(m, true);
      feed.appendChild(el.firstElementChild);
    });
  } else {
    // Capture which IDs were already rendered before wiping
    const prevIds = new Set([...feed.querySelectorAll('.msg-row')].map(r => r.dataset.id));
    let lastDate = '', html = '';
    for (const m of msgs) {
      const ds = fmtDate(m.timestamp);
      if (ds !== lastDate) { html += `<div class="date-div" role="separator">${esc(ds)}</div>`; lastDate = ds; }
      html += msgHtml(m, false);
    }
    feed.innerHTML = html;
    // Flash rows that weren't previously visible (skip on first render when prevIds is empty)
    if (prevIds.size > 0) {
      feed.querySelectorAll('.msg-row').forEach(row => {
        if (!prevIds.has(row.dataset.id)) row.classList.add('is-new');
      });
    }
  }
  feed.dataset.count = msgs.length;
  if (atBottom) feed.scrollTop = feed.scrollHeight;
  else if (!isAppend) feed.scrollTop = prevTop;
}

function msgHtml(m, isNew) {
  const hex = assignColor(m.sender);
  const style = workerStyle(m.sender);
  const toLabel = m.recipient === 'all'
    ? `<span class="msg-to">→ <b>@all</b></span>`
    : m.recipient ? `<span class="msg-to">→ @${esc(m.recipient)}</span>` : '';
  const replyBtn = `<button class="msg-reply-btn" data-to="${esc(m.sender)}" aria-label="Reply to ${esc(m.sender)}" title="Reply to @${esc(m.sender)}">↩</button>`;
  return `<div class="msg-row${isNew?' is-new':''}" data-id="${esc(m.id)}" aria-label="${esc(m.sender)}: ${esc(m.content)}">
    <div class="msg-av">${faceHtml(style, hex)}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author" style="color:${hex}">@${esc(m.sender)}</span>
        ${toLabel}
        <time class="msg-time" datetime="${esc(m.timestamp)}">${fmtTime(m.timestamp)}</time>
        <span class="msg-hash">${esc(m.hash.slice(0,7))}</span>
        ${replyBtn}
      </div>
      <div class="msg-text">${renderContent(m.content)}</div>
    </div>
  </div>`;
}

function syncMemberList(container, workers, isOnline) {
  const existing = new Map([...container.querySelectorAll('.member-row')].map(el => [el.dataset.id, el]));
  const current  = new Set(workers.map(w => w.instance_id));
  existing.forEach((el, id) => { if (!current.has(id)) el.remove(); });
  workers.forEach(w => {
    if (existing.has(w.instance_id)) patchMemberRow(existing.get(w.instance_id), w, isOnline);
    else container.appendChild(buildMemberRow(w, isOnline));
  });
}

function timeAgo(ts) {
  const s = (Date.now() - new Date(ts)) / 1000;
  if (s < 15)   return 'just now';
  if (s < 60)   return `${Math.round(s)}s ago`;
  if (s < 3600) return `${Math.round(s / 60)}m ago`;
  if (s < 86400)return `${Math.round(s / 3600)}h ago`;
  return `${Math.round(s / 86400)}d ago`;
}

const workerTip = document.getElementById('worker-tip');
let tipRow = null;

document.querySelector('.members').addEventListener('mouseover', e => {
  const row = e.target.closest('.member-row');
  if (row === tipRow) return;
  tipRow = row;
  if (!row) { workerTip.hidden = true; return; }

  const id = row.dataset.id;
  const w  = S.workers.find(x => x.instance_id === id);
  if (!w) { workerTip.hidden = true; return; }

  const isOn    = online(w.last_seen);
  const hex     = assignColor(id);
  const msgsSent = getAllMsgs().filter(m => m.sender === id).length;
  const msgsRecv = getAllMsgs().filter(m => m.recipient === id).length;
  const dotStyle = `background:${isOn ? '#22c55e' : 'var(--offline)'}`;

  workerTip.innerHTML =
    `<div class="tip-name" style="color:${hex}">@${esc(id)}</div>` +
    `<div class="tip-row"><span class="tip-dot" style="${dotStyle}"></span>${isOn ? 'Online' : 'Offline'} &middot; ${timeAgo(w.last_seen)}</div>` +
    (w.role ? `<div class="tip-row" style="margin-top:6px"><span class="tip-lbl">Role</span>${esc(w.role)}</div>` : '') +
    `<div class="tip-row" style="margin-top:6px"><span class="tip-lbl">Msgs</span>${msgsSent} sent &middot; ${msgsRecv} recv</div>`;

  workerTip.hidden = false;
  const rect = row.getBoundingClientRect();
  const tw = workerTip.offsetWidth, th = workerTip.offsetHeight;
  let left = rect.left - tw - 10;
  let top  = rect.top + (rect.height - th) / 2;
  if (left < 8) left = rect.right + 10;
  if (top + th > window.innerHeight - 8) top = window.innerHeight - th - 8;
  workerTip.style.left = `${Math.max(8, left)}px`;
  workerTip.style.top  = `${Math.max(8, top)}px`;
});

// Warm up AudioContext on first gesture so it's ready when we need it
document.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: false });

function playPing() {
  if (!soundEnabled()) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { audioCtx.resume().then(playPing); return; }
    const now = audioCtx.currentTime;
    // Two-tone soft chime: A5 then C#6
    [[880, 0, 0.3], [1108, 0.18, 0.45]].forEach(([freq, delay, end]) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + delay);
      gain.gain.linearRampToValueAtTime(0.22, now + delay + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + end);
      osc.start(now + delay); osc.stop(now + end + 0.05);
    });
  } catch {}
}

function checkForPings(allMsgs) {
  const myName = document.getElementById('compose-name').value.trim().toLowerCase();
  let shouldPing = false;
  for (const m of allMsgs) {
    if (S.seenIds.has(m.id)) continue;
    S.seenIds.add(m.id);
    if (!myName) continue;
    if (m.sender.toLowerCase() === myName) continue; // own message
    const to = (m.recipient || '').toLowerCase();
    if (to === 'all' || to === myName) shouldPing = true;
  }
  if (shouldPing) playPing();
}

// ── Polling ───────────────────────────────────────────────────────────────────
async function pollAll() {
  try {
    const workers = await api('/roster');
    setConn('ok');
    const prevIds = new Set(S.workers.map(w => w.instance_id));
    workers.forEach(w => { assignColor(w.instance_id); if (!prevIds.has(w.instance_id)) announce(`${w.instance_id} joined`); });
    S.workers = workers;
    renderMembers();
    await Promise.allSettled(workers.map(w => loadHistory(w.instance_id)));
    checkForPings(getAllMsgs());
    renderFeed();
    document.getElementById('last-updated').textContent = 'updated ' + new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch (e) { console.error('[pollAll]', e); setConn('err'); }
}

async function loadHistory(id) {
  try { S.histories[id] = await api(`/history/${id}`); } catch {}
}

function isValidId(s) {
  return s.length > 0 && s.length <= 64 && /^[a-zA-Z0-9\-_]+$/.test(s);
}

async function heartbeat() {
  const me = document.getElementById('compose-name').value.trim();
  if (!isValidId(me)) return;
  try {
    await api(`/presence/${encodeURIComponent(me)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: null }),
    });
  } catch {} // silent — don't disrupt anything if it fails
}

function startPolling() {
  S.timers.forEach(clearInterval);
  S.timers.length = 0;
  heartbeat();
  pollAll();
  S.timers.push(setInterval(pollAll, 3000));
  S.timers.push(setInterval(heartbeat, 30000));
}

// ── Avatar picker ─────────────────────────────────────────────────────────────
let pickerTarget = null;
let pickerAnchor = null;
let pickerJustOpened = false;

function openPicker(id, anchorEl) {
  pickerTarget = id; pickerAnchor = anchorEl;
  const picker = document.getElementById('picker');
  const hex    = assignColor(id);
  const style  = workerStyle(id);

  // Set CSS vars for selected state
  picker.style.setProperty('--picker-color', hex);
  picker.style.setProperty('--picker-rgb', hexRgb(hex));

  // Highlight active avatar
  picker.querySelectorAll('.av-btn').forEach(btn => {
    const sel = btn.dataset.style === style;
    btn.classList.toggle('selected', sel);
    btn.setAttribute('aria-pressed', String(sel));
  });

  // Highlight active color
  picker.querySelectorAll('.preset-dot').forEach(dot => {
    dot.classList.toggle('sel', dot.dataset.hex === hex);
  });
  document.getElementById('picker-custom').value = hex;

  // Position: prefer left of anchor (members panel is on right)
  picker.hidden = false;
  const rect = anchorEl.getBoundingClientRect();
  const pw = picker.offsetWidth, ph = picker.offsetHeight;
  let left = rect.left - pw - 10;
  let top  = rect.top;
  if (left < 8) left = rect.right + 10;
  if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
  picker.style.left = `${Math.max(8, left)}px`;
  picker.style.top  = `${Math.max(8, top)}px`;

  // Reset search
  const searchEl = document.getElementById('av-search');
  if (searchEl.value) { searchEl.value = ''; buildPickerGrid(); }

  pickerJustOpened = true;
  picker.querySelector('.av-btn')?.focus();
}

function closePicker() {
  document.getElementById('picker').hidden = true;
  pickerTarget = null; pickerAnchor = null;
}

document.getElementById('av-search').addEventListener('input', e => {
  buildPickerGrid(e.target.value);
  // Re-apply selected state for current target
  if (pickerTarget) {
    const style = workerStyle(pickerTarget);
    document.querySelectorAll('#av-grid .av-btn').forEach(btn => {
      const sel = btn.dataset.style === style;
      btn.classList.toggle('selected', sel);
      btn.setAttribute('aria-pressed', String(sel));
    });
  }
});

function applyPickerColor(hex) {
  if (!pickerTarget) return;
  S.colorMap[pickerTarget] = hex;
  setPrefs(pickerTarget, { color: hex });
  // Update CSS vars in picker
  const picker = document.getElementById('picker');
  picker.style.setProperty('--picker-color', hex);
  picker.style.setProperty('--picker-rgb', hexRgb(hex));
  // Update selected dot
  picker.querySelectorAll('.preset-dot').forEach(d => d.classList.toggle('sel', d.dataset.hex === hex));
  // Refresh avatar everywhere
  refreshAll(pickerTarget);
}

function refreshAll(id) {
  // Member panel
  const row = document.querySelector(`.member-row[data-id="${CSS.escape(id)}"]`);
  if (row) refreshMemberAvatar(row, id);
  // Feed (full re-render to pick up new color/avatar)
  document.getElementById('feed').dataset.count = 0;
  renderFeed();
}

// Avatar button clicks
document.getElementById('av-grid').addEventListener('click', e => {
  const btn = e.target.closest('.av-btn');
  if (!btn || !pickerTarget) return;
  setPrefs(pickerTarget, { style: btn.dataset.style });
  document.querySelectorAll('.av-btn').forEach(b => {
    const sel = b === btn;
    b.classList.toggle('selected', sel);
    b.setAttribute('aria-pressed', String(sel));
  });
  refreshAll(pickerTarget);
});

// Preset color clicks
document.getElementById('color-row').addEventListener('click', e => {
  const dot = e.target.closest('.preset-dot');
  if (!dot || !pickerTarget) return;
  document.getElementById('picker-custom').value = dot.dataset.hex;
  applyPickerColor(dot.dataset.hex);
});

// Native color picker
document.getElementById('picker-custom').addEventListener('input', e => {
  if (!pickerTarget) return;
  applyPickerColor(e.target.value);
  document.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('sel'));
});

// Close on outside click
document.addEventListener('click', () => {
  if (pickerJustOpened) { pickerJustOpened = false; return; }
  closePicker();
});
document.getElementById('picker').addEventListener('click', e => e.stopPropagation());
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePicker(); });

// ── Slash commands ────────────────────────────────────────────────────────────
const SLASH_CMDS = [
  { cmd: 'r',   desc: 'Reply to last sender',  hint: '/r [text]'            },
  { cmd: 'w',   desc: 'DM a worker',           hint: '/w <worker> [text]'   },
  { cmd: 'all', desc: 'Message everyone',      hint: '/all [text]'          },
];
let slashMatches = [], slashIdx = 0;

function lastSenderForMe() {
  const me   = document.getElementById('compose-name').value.trim();
  const msgs = getAllMsgs();
  // Prefer someone who specifically addressed me
  for (let i = msgs.length - 1; i >= 0; i--) {
    const m = msgs[i];
    if (m.sender !== me && (m.recipient === me || m.recipient === 'all')) return m.sender;
  }
  // Fallback: anyone else
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].sender !== me) return msgs[i].sender;
  }
  return null;
}

function renderSlashList() {
  const list = document.getElementById('slash-list');
  if (!slashMatches.length) { list.hidden = true; return; }
  list.hidden = false;
  list.innerHTML = slashMatches.map((c, i) =>
    `<li class="slash-item" role="option"${i === slashIdx ? ' aria-selected="true"' : ''} data-cmd="${esc(c.cmd)}">` +
    `<span class="slash-cmd">/${esc(c.cmd)}</span>` +
    `<span class="slash-desc">${esc(c.desc)}</span>` +
    `<span class="slash-hint">${esc(c.hint)}</span>` +
    `</li>`
  ).join('');
}

function closeSlashList() {
  slashMatches = []; slashIdx = 0;
  document.getElementById('slash-list').hidden = true;
}

function applySlash(cmd) {
  const input = document.getElementById('compose-input');
  closeSlashList();
  if (cmd === 'r') {
    const sender = lastSenderForMe();
    if (sender) { input.value = `@${sender} `; input.setSelectionRange(input.value.length, input.value.length); }
    else { input.value = ''; announce('No recent messages to reply to'); }
  } else if (cmd === 'all') {
    input.value = '@all '; input.setSelectionRange(input.value.length, input.value.length);
  } else if (cmd === 'w') {
    input.value = '@'; input.setSelectionRange(1, 1);
    // Trigger mention autocomplete
    input.dispatchEvent(new Event('input'));
  }
}

function expandSlashOnSend(text) {
  if (!text.startsWith('/')) return text;
  const spIdx = text.indexOf(' ');
  const cmd   = spIdx === -1 ? text.slice(1) : text.slice(1, spIdx);
  const rest  = spIdx === -1 ? '' : text.slice(spIdx + 1).trim();
  if (cmd === 'r') {
    const sender = lastSenderForMe();
    if (!sender) { announce('No recent messages to reply to'); return null; }
    return rest ? `@${sender} ${rest}` : `@${sender} `;
  }
  if (cmd === 'all') return rest ? `@all ${rest}` : '@all ';
  if (cmd === 'w') {
    const parts = rest.split(/\s+/);
    const worker = parts[0];
    if (!worker) { announce('Usage: /w <worker> [message]'); return null; }
    const body = parts.slice(1).join(' ');
    return body ? `@${worker} ${body}` : `@${worker} `;
  }
  return text; // unknown — send as-is
}

// ── Mention autocomplete ──────────────────────────────────────────────────────
let mentionIdx = 0;
let mentionMatches = [];

function getMentionQuery(val, caret) {
  const before = val.slice(0, caret);
  const m = before.match(/(?:^|\s)@(\S*)$/);
  return m ? m[1] : null;
}

function mentionCandidates(query) {
  const all = ['all', ...S.workers.map(w => w.instance_id)];
  const q = query.toLowerCase();
  return all.filter(id => id.toLowerCase().startsWith(q));
}

function renderMentionList() {
  const list = document.getElementById('mention-list');
  if (!mentionMatches.length) { list.hidden = true; return; }
  list.hidden = false;
  list.innerHTML = mentionMatches.map((id, i) => {
    const worker = S.workers.find(w => w.instance_id === id);
    const color = id === 'all' ? '#8896b3' : assignColor(id);
    const role = worker?.role || (id === 'all' ? 'everyone' : '');
    const sel = i === mentionIdx ? ' aria-selected="true"' : '';
    return `<li class="mention-item" role="option"${sel} data-id="${esc(id)}">` +
      `<span class="mention-dot" style="background:${color}"></span>` +
      `<span style="color:${color}">@${esc(id)}</span>` +
      (role ? `<span class="mention-role">${esc(role)}</span>` : '') +
      `</li>`;
  }).join('');
}

function closeMentionList() {
  mentionMatches = [];
  mentionIdx = 0;
  document.getElementById('mention-list').hidden = true;
}

function applyMention(id) {
  const input = document.getElementById('compose-input');
  const val = input.value;
  const caret = input.selectionStart;
  const before = val.slice(0, caret);
  const after  = val.slice(caret);
  const replaced = before.replace(/(?<=(?:^|\s))@\S*$/, `@${id} `);
  input.value = replaced + after;
  const pos = replaced.length;
  input.setSelectionRange(pos, pos);
  closeMentionList();
}

document.getElementById('compose-input').addEventListener('input', () => {
  const input = document.getElementById('compose-input');
  const val   = input.value;

  // Slash command palette — show when typing /cmd with no space yet
  if (val.startsWith('/') && !val.includes(' ')) {
    const q = val.slice(1).toLowerCase();
    slashMatches = SLASH_CMDS.filter(c => c.cmd.startsWith(q));
    slashIdx = 0;
    closeMentionList();
    renderSlashList();
    return;
  }
  closeSlashList();

  // Auto-expand slash commands once a space is typed
  if (val === '/r ') {
    const sender = lastSenderForMe();
    if (sender) { input.value = `@${sender} `; input.setSelectionRange(input.value.length, input.value.length); return; }
  }
  if (val === '/all ') { input.value = '@all '; input.setSelectionRange(input.value.length, input.value.length); return; }
  if (val === '/w ') { input.value = '@'; input.setSelectionRange(1, 1); }

  const query = getMentionQuery(input.value, input.selectionStart);
  if (query === null) { closeMentionList(); return; }
  mentionMatches = mentionCandidates(query);
  mentionIdx = 0;
  renderMentionList();
});

document.getElementById('mention-list').addEventListener('mousedown', e => {
  const item = e.target.closest('.mention-item');
  if (item) { e.preventDefault(); applyMention(item.dataset.id); }
});
document.getElementById('slash-list').addEventListener('mousedown', e => {
  const item = e.target.closest('.slash-item');
  if (item) { e.preventDefault(); applySlash(item.dataset.cmd); }
});
document.getElementById('compose-input').addEventListener('blur', () => {
  setTimeout(() => { closeMentionList(); closeSlashList(); }, 150);
});

// ── Compose ───────────────────────────────────────────────────────────────────
async function handleSend() {
  const nameEl  = document.getElementById('compose-name');
  const inputEl = document.getElementById('compose-input');
  const sendBtn = document.getElementById('compose-send');
  const from    = nameEl.value.trim();
  let   text    = inputEl.value.trim();

  if (!from) {
    nameEl.focus();
    nameEl.style.color = '#ef4444';
    setTimeout(() => nameEl.style.color = '', 1500);
    return;
  }
  if (!text && !pendingImage) return;

  // Expand slash commands typed directly at send time
  if (text.startsWith('/')) {
    const expanded = expandSlashOnSend(text);
    if (expanded === null) return;
    text = expanded.trim();
  }
  if (!text && !pendingImage) return;

  let to = 'all';
  const m = text.match(/^@(\S+)\s+([\s\S]*)$/);
  if (m) { to = m[1]; text = m[2].trim() || text; }

  const content = pendingImage
    ? (text ? text + '\n[img]' + pendingImage : pendingImage)
    : text;
  if (!content) return;

  localStorage.setItem('collab-from', from);
  inputEl.value = '';
  const savedImage = pendingImage;
  pendingImage = null;
  document.getElementById('img-strip').hidden = true;
  document.getElementById('img-preview-thumb').src = '';
  sendBtn.disabled = true;

  try {
    await Promise.all([
      api('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender: from, recipient: to, content, refs: [] }),
      }),
      heartbeat(),
    ]);
    await pollAll();
  } catch {
    announce('Failed to send — is the server running?');
    inputEl.value = text;
    if (savedImage) {
      pendingImage = savedImage;
      document.getElementById('img-strip').hidden = false;
      document.getElementById('img-preview-thumb').src = savedImage;
    }
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

document.getElementById('compose-send').addEventListener('click', handleSend);
document.getElementById('compose-input').addEventListener('keydown', e => {
  if (slashMatches.length) {
    if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      applySlash(slashMatches[slashIdx].cmd);
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      slashIdx = (slashIdx + 1) % slashMatches.length;
      renderSlashList();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      slashIdx = (slashIdx - 1 + slashMatches.length) % slashMatches.length;
      renderSlashList();
      return;
    }
    if (e.key === 'Escape') { closeSlashList(); return; }
  }
  if (mentionMatches.length) {
    if (e.key === 'Tab' || e.key === 'ArrowRight') {
      e.preventDefault();
      applyMention(mentionMatches[mentionIdx]);
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      mentionIdx = (mentionIdx + 1) % mentionMatches.length;
      renderMentionList();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      mentionIdx = (mentionIdx - 1 + mentionMatches.length) % mentionMatches.length;
      renderMentionList();
      return;
    }
    if (e.key === 'Escape') { closeMentionList(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── Image paste ───────────────────────────────────────────────────────────────
document.getElementById('compose-input').addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        pendingImage = ev.target.result;
        document.getElementById('img-preview-thumb').src = pendingImage;
        document.getElementById('img-strip').hidden = false;
      };
      reader.readAsDataURL(file);
      break;
    }
  }
});

document.getElementById('img-remove-btn').addEventListener('click', () => {
  pendingImage = null;
  document.getElementById('img-strip').hidden = true;
  document.getElementById('img-preview-thumb').src = '';
  document.getElementById('compose-input').focus();
});

document.getElementById('feed').addEventListener('click', e => {
  const reply = e.target.closest('.msg-reply-btn');
  if (reply) {
    const input = document.getElementById('compose-input');
    input.value = `@${reply.dataset.to} `;
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    return;
  }
  const img = e.target.closest('.msg-img');
  if (img) window.open(img.src, '_blank');
});

function switchTab(toMentions) {
  S.inboxMode = toMentions;
  document.getElementById('tab-all').classList.toggle('active', !toMentions);
  document.getElementById('tab-all').setAttribute('aria-selected', String(!toMentions));
  document.getElementById('tab-mentions').classList.toggle('active', toMentions);
  document.getElementById('tab-mentions').setAttribute('aria-selected', String(toMentions));
  document.getElementById('feed').dataset.count = 0;
  renderFeed();
}
document.getElementById('tab-all').addEventListener('click', () => switchTab(false));
document.getElementById('tab-mentions').addEventListener('click', () => switchTab(true));

// Re-compute inbox count when your name changes
document.getElementById('compose-name').addEventListener('input', () => renderFeed());
document.getElementById('compose-name').addEventListener('change', () => heartbeat());

// ── Stop / resume all workers ─────────────────────────────────────────────────
const STOP_SIGNAL = '__COLLAB_STOP_WATCH__';

document.getElementById('stop-btn').addEventListener('click', async () => {
  const btn = document.getElementById('stop-btn');
  const stopped = btn.dataset.state === 'stopped';

  if (!stopped) {
    const ok = confirm('Send stop signal to all workers?\n\nThis will interrupt any active collab watch sessions.');
    if (!ok) return;
  }

  const sender = document.getElementById('compose-name').value.trim() || 'dashboard';
  const content = stopped ? 'Polling resumed — collab watch restart requested' : STOP_SIGNAL;

  try {
    await api('/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender, recipient: 'all', content, refs: [] }),
    });
    btn.dataset.state = stopped ? 'running' : 'stopped';
    btn.textContent  = stopped ? '⏹ Stop All' : '▶ Resume All';
    btn.setAttribute('aria-label', stopped ? 'Stop all worker polling' : 'Resume all worker polling');
    await pollAll();
  } catch {
    announce('Failed to send signal — is the server running?');
  }
});

// ── Import config ─────────────────────────────────────────────────────────────
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const cfg = JSON.parse(ev.target.result);
      if (cfg.workers) {
        Object.entries(cfg.workers).forEach(([id, prefs]) => {
          if (prefs.color) S.colorMap[id] = typeof prefs.color==='number' ? PRESET_COLORS[prefs.color%PRESET_COLORS.length] : prefs.color;
          setPrefs(id, { style: prefs.avatar || 'robot', color: S.colorMap[id] });
        });
        document.getElementById('feed').dataset.count = 0;
        renderFeed(); renderMembers();
      }
      announce('Config imported');
    } catch { announce('Failed to parse config'); }
  };
  reader.readAsText(file); e.target.value = '';
});

// ── Server URL ────────────────────────────────────────────────────────────────
document.getElementById('server-url').addEventListener('change', e => {
  S.url = e.target.value.trim() || 'http://localhost:8000';
  localStorage.setItem('collab-url', S.url);
  S.histories = {}; S.workers = [];
  document.getElementById('feed').dataset.count = 0;
  setConn('connecting');
  startPolling();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
startPolling();
</script>
